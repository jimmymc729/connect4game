<style>
  :root {
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
    --tap: 44px;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, system-ui, sans-serif;
    background: #0a1a2e;
    color: #fff;
    touch-action: manipulation;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
  }

  /* Top bar */
  #topbar {
    padding:
      calc(8px + var(--safe-top))
      calc(10px + var(--safe-right))
      10px
      calc(10px + var(--safe-left));
    background: #061225;
    border-bottom: 2px solid #1a3a5c;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  #topbar-row1,
  #topbar-row2 {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }

  #topbar-row1 { justify-content: space-between; }
  #topbar-row2 {
    justify-content: flex-start;
    flex-wrap: wrap;
  }

  #score {
    font-size: clamp(20px, 6vw, 34px);
    font-weight: 900;
    letter-spacing: 1.2px;
    line-height: 1;
    white-space: nowrap;
  }
  #score .red { color: #ff3b47; }
  #score .yel { color: #ffd028; }
  #score .dash { color: #5a7a9a; margin: 0 8px; }

  #menu-btn,
  #reset-btn,
  #difficulty-btn,
  #sound-btn,
  #share-btn {
    height: var(--tap);
    min-height: var(--tap);
    border-radius: 11px;
    border: 2px solid;
    cursor: pointer;
    font-weight: 800;
    padding: 0 12px;
    line-height: 1;
    white-space: nowrap;
  }

  #difficulty-btn {
    font-size: clamp(13px, 3.5vw, 16px);
    background: #1a3a5c;
    color: #fff;
    border-color: #2a5a8c;
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;
    padding-right: 28px;
    background-image:
      linear-gradient(45deg, transparent 50%, #9ec3ff 50%),
      linear-gradient(135deg, #9ec3ff 50%, transparent 50%);
    background-position:
      calc(100% - 16px) calc(50% - 2px),
      calc(100% - 11px) calc(50% - 2px);
    background-size: 5px 5px, 5px 5px;
    background-repeat: no-repeat;
  }
  #sound-btn {
    width: var(--tap);
    min-width: var(--tap);
    font-size: 20px;
    padding: 0;
    background: #1a3a5c;
    color: #fff;
    border-color: #2a5a8c;
    flex: 0 0 auto;
  }
  #share-btn {
    font-size: clamp(13px, 3.5vw, 16px);
    background: #1f4f37;
    color: #fff;
    border-color: #3b8f66;
  }
  #menu-btn {
    font-size: clamp(12px, 3.4vw, 15px);
    color: #9ec3ff;
    background: #13223a;
    border-color: #2a4a74;
    flex: 0 0 auto;
  }
  #reset-btn {
    font-size: clamp(12px, 3.4vw, 15px);
    color: #ff8888;
    background: #2a1a1a;
    border-color: #5a2a2a;
    flex: 0 0 auto;
  }

  /* Main area */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    min-height: 0;
  }

  /* Turn panels */
  .panel {
    width: 100%;
    display: flex;
    flex-direction: row;
    justify-content: center;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    transition: opacity 0.25s, filter 0.25s;
  }
  .panel.dim { opacity: 0.28; filter: grayscale(60%); }
  .panel-label {
    font-size: clamp(12px, 3.3vw, 16px);
    font-weight: 900;
    letter-spacing: 1px;
    text-align: center;
  }
  .panel-left .panel-label { color: #ff3b47; }
  .panel-right .panel-label { color: #ffd028; }
  .turn-indicator {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 3px solid;
    box-shadow: inset -4px -4px 8px rgba(0,0,0,0.35);
    flex: 0 0 auto;
  }
  .panel-left .turn-indicator {
    background: radial-gradient(circle at 35% 30%, #ff6b77, #ff3b47 50%, #c01820);
    border-color: #ff3b47;
  }
  .panel-right .turn-indicator {
    background: radial-gradient(circle at 35% 30%, #ffe878, #ffd028 50%, #c09018);
    border-color: #ffd028;
  }
  .panel .your-turn {
    font-size: clamp(11px, 3.1vw, 14px);
    font-weight: 800;
    letter-spacing: 0.7px;
    opacity: 0;
    transition: opacity 0.2s;
    text-align: center;
    min-height: 1em;
  }
  .panel:not(.dim) .your-turn { opacity: 1; }
  .panel:not(.dim) .turn-indicator { animation: turnpulse 1.6s infinite ease-in-out; }
  @keyframes turnpulse {
    0%, 100% { transform: scale(1); filter: brightness(1); }
    50% { transform: scale(1.05); filter: brightness(1.2); }
  }

  /* Column hover zones on the board */
  .col-zone { position: absolute; top: 0; height: 100%; cursor: pointer; }
  .col-zone.disabled { cursor: not-allowed; }
  .col-zone.hover-active::before {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    top: 0;
    bottom: 0;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
  }
  .preview-piece {
    position: absolute;
    pointer-events: none;
    border-radius: 50%;
    box-shadow: inset -4px -4px 8px rgba(0,0,0,0.4);
    opacity: 0.75;
    transition: left 0.12s ease-out, opacity 0.2s;
    z-index: 5;
  }
  .preview-piece.red { background: radial-gradient(circle at 35% 30%, #ff6b77, #ff3b47 50%, #c01820); }
  .preview-piece.yel { background: radial-gradient(circle at 35% 30%, #ffe878, #ffd028 50%, #c09018); }
  .preview-piece.hidden { opacity: 0; }

  /* Thinking dots */
  .thinking { display: flex; gap: 8px; justify-content: center; align-items: center; height: 60px; }
  .thinking span { width: 12px; height: 12px; border-radius: 50%; background: #ffd028; animation: pulse 1.2s infinite ease-in-out; }
  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1.2); opacity: 1; }
  }

  /* Board */
  #board-wrap {
    flex: 1;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px;
    position: relative;
  }
  #board-container { position: relative; }
  #board {
    background: #1a4a8a;
    border: 5px solid #0a2a5a;
    border-radius: 16px;
    padding: 8px;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    grid-template-rows: repeat(6, 1fr);
    gap: 8px;
    box-shadow: 0 0 28px rgba(0, 100, 200, 0.28);
    position: relative;
  }
  .cell { background: #0a1a2e; border-radius: 50%; position: relative; overflow: hidden; }
  .piece { position: absolute; inset: 6%; border-radius: 50%; transition: opacity 0.4s; }
  .piece.red,
  .piece.red {
    background: radial-gradient(circle at 35% 30%, #ff6b77, #ff3b47 50%, #c01820);
    box-shadow: inset -4px -4px 8px rgba(0,0,0,0.4);
  }
  .piece.yel,
  .piece.yel {
    background: radial-gradient(circle at 35% 30%, #ffe878, #ffd028 50%, #c09018);
    box-shadow: inset -4px -4px 8px rgba(0,0,0,0.4);
  }
  .piece.drop { animation: drop 0.45s cubic-bezier(0.5, 0, 0.7, 1); }
  @keyframes drop {
    0% { transform: translateY(var(--drop-from)); }
    85% { transform: translateY(2%); }
    92% { transform: translateY(-1%); }
    100% { transform: translateY(0); }
  }
  .piece.win { animation: winpulse 0.8s infinite ease-in-out; }
  @keyframes winpulse {
    0%, 100% { transform: scale(1); filter: brightness(1); }
    50% { transform: scale(1.08); filter: brightness(1.4); }
  }
  .piece.lose { opacity: 0.4; }

  /* Win line overlay */
  #winline { position: absolute; pointer-events: none; }
  #winline line {
    stroke: #fff;
    stroke-width: 6;
    stroke-linecap: round;
    filter: drop-shadow(0 0 10px #fff);
  }

  /* Overlays */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(6, 18, 37, 0.9);
    z-index: 10;
    padding: 12px;
    overflow: auto;
  }
  .overlay.hidden { display: none; }

  #mode-select { flex-direction: column; gap: 18px; }
  #mode-select h1 {
    font-size: clamp(36px, 11vw, 62px);
    font-weight: 900;
    letter-spacing: 2px;
    text-align: center;
    background: linear-gradient(90deg, #ff3b47, #ffd028);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  #mode-select .mode-btns {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
    width: min(94vw, 520px);
  }
  #mode-select .mode-btns.link-disabled { grid-template-columns: 1fr; }
  .mode-btn {
    font-size: clamp(18px, 5vw, 28px);
    font-weight: 900;
    padding: 16px 14px;
    border-radius: 16px;
    border: 3px solid;
    background: #0a2a5a;
    color: #fff;
    cursor: pointer;
    min-height: clamp(88px, 16vw, 132px);
    letter-spacing: 1px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .mode-btn .mode-sub { font-size: clamp(12px, 3.4vw, 17px); letter-spacing: 0.5px; font-weight: 700; opacity: 0.88; }
  .mode-btn.preferred {
    box-shadow: 0 0 0 4px rgba(255,255,255,0.2), 0 0 24px rgba(255,255,255,0.14);
    transform: translateY(-2px);
  }
  #mode-cpu { border-color: #ff3b47; }
  #mode-pass { border-color: #ffd028; }
  #mode-link { border-color: #47d48f; }
  .mode-btn:active { transform: scale(0.98); }

  #ready-overlay {
    flex-direction: column;
    justify-content: center;
    gap: 10px;
  }

  #cpu-side-select {
    flex-direction: column;
    justify-content: center;
    gap: 12px;
  }
  #cpu-side-select h2 {
    font-size: clamp(26px, 8vw, 46px);
    font-weight: 900;
    letter-spacing: 1.2px;
    text-align: center;
  }
  #cpu-side-actions {
    display: grid;
    width: min(92vw, 560px);
    grid-template-columns: 1fr;
    gap: 8px;
  }
  .cpu-side-btn {
    font-size: clamp(17px, 4.8vw, 28px);
    font-weight: 900;
    padding: 14px 14px;
    border-radius: 14px;
    border: 3px solid;
    background: #0a2a5a;
    color: #fff;
    cursor: pointer;
    min-height: 56px;
    letter-spacing: 0.8px;
  }
  .cpu-side-btn.red { border-color: #ff3b47; }
  .cpu-side-btn.yel { border-color: #ffd028; }
  .cpu-side-btn:active { transform: scale(0.98); }
  .ready-btn {
    font-size: clamp(20px, 6vw, 38px);
    font-weight: 900;
    padding: 14px 16px;
    border-radius: 14px;
    border: 3px solid;
    background: #0a2a5a;
    color: #fff;
    cursor: pointer;
    min-height: 84px;
    width: min(92vw, 460px);
    letter-spacing: 1px;
  }
  .ready-btn.p1 { border-color: #ff3b47; }
  .ready-btn.p2 { border-color: #ffd028; }
  .ready-btn.done { background: #1a5a2a; border-color: #4aff6a; }
  .ready-btn:active { transform: scale(0.98); }

  #match-end {
    flex-direction: column;
    justify-content: center;
    gap: 14px;
  }
  #match-end h2 {
    font-size: clamp(32px, 9vw, 64px);
    font-weight: 900;
    letter-spacing: 1.2px;
    text-align: center;
    line-height: 1.1;
  }
  #match-end-actions {
    display: grid;
    width: min(92vw, 560px);
    grid-template-columns: 1fr;
    gap: 8px;
  }
  #new-match-btn,
  #mode-menu-btn,
  #challenge-link-btn {
    font-size: clamp(15px, 4vw, 24px);
    font-weight: 900;
    padding: 14px 12px;
    border-radius: 14px;
    border: 3px solid;
    background: #0a2a5a;
    color: #fff;
    cursor: pointer;
    min-height: 56px;
    letter-spacing: 0.8px;
  }
  #new-match-btn { border-color: #4aff6a; }
  #mode-menu-btn { border-color: #9ec3ff; }
  #challenge-link-btn { border-color: #47d48f; }
  #challenge-link-btn.hidden { display: none; }
  #new-match-btn:active, #mode-menu-btn:active, #challenge-link-btn:active { transform: scale(0.98); }

  #async-turn-overlay { z-index: 12; }
  #async-turn-card {
    width: min(92vw, 560px);
    border-radius: 16px;
    border: 3px solid #5a84c4;
    background: rgba(9, 28, 53, 0.95);
    padding: 16px 14px;
    box-shadow: 0 0 28px rgba(0, 120, 220, 0.3);
    display: flex;
    flex-direction: column;
    gap: 12px;
    text-align: center;
  }
  #async-turn-title {
    font-size: clamp(24px, 7vw, 38px);
    font-weight: 900;
    letter-spacing: 1px;
    line-height: 1.1;
  }
  #async-turn-sub {
    font-size: clamp(13px, 3.6vw, 18px);
    font-weight: 700;
    color: #c7dcfa;
    line-height: 1.25;
  }
  #async-turn-actions {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
  }
  .async-turn-btn {
    font-size: clamp(14px, 4vw, 18px);
    font-weight: 900;
    padding: 12px 12px;
    border-radius: 12px;
    border: 2px solid;
    background: #0a2a5a;
    color: #fff;
    cursor: pointer;
    min-height: 50px;
    letter-spacing: 0.7px;
  }
  #async-share-btn { border-color: #47d48f; background: #144934; }
  #async-remind-btn { border-color: #ffd028; color: #ffe682; }
  #async-close-btn { border-color: #6b92c9; }
  .async-turn-btn:active { transform: scale(0.98); }
  #async-remind-btn.hidden,
  #async-share-btn.hidden,
  #async-close-btn.hidden { display: none; }

  /* Round announcement banner */
  #announce {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%) scale(0.65);
    width: min(92vw, 680px);
    padding: 16px 14px;
    border-radius: 16px;
    background: rgba(6, 18, 37, 0.92);
    border: 4px solid;
    font-size: clamp(28px, 8vw, 62px);
    font-weight: 900;
    letter-spacing: 1px;
    text-align: center;
    white-space: normal;
    line-height: 1.1;
    opacity: 0;
    pointer-events: none;
    z-index: 20;
    transition: opacity 0.3s, transform 0.35s cubic-bezier(0.3, 1.6, 0.5, 1);
    box-shadow: 0 0 40px rgba(255, 255, 255, 0.2);
  }
  #announce.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  #announce.red { border-color: #ff3b47; color: #ff3b47; text-shadow: 0 0 18px rgba(255, 59, 71, 0.8); }
  #announce.yel { border-color: #ffd028; color: #ffd028; text-shadow: 0 0 18px rgba(255, 208, 40, 0.8); }
  #announce.draw { border-color: #88aacc; color: #ffffff; text-shadow: 0 0 18px rgba(136, 170, 204, 0.8); }
  #announce .sub {
    display: block;
    font-size: clamp(13px, 3.4vw, 28px);
    font-weight: 700;
    letter-spacing: 0.8px;
    margin-top: 8px;
    color: #fff;
    opacity: 0.9;
  }

  /* Tablet and desktop */
  @media (min-width: 900px) {
    #topbar {
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
    }

    #topbar-row1,
    #topbar-row2 {
      width: auto;
      flex-wrap: nowrap;
    }
    #topbar-row1 { justify-content: flex-start; }
    #topbar-row2 { justify-content: flex-end; }

    #main {
      flex-direction: row;
    }

    .panel {
      width: 14%;
      flex-direction: column;
      justify-content: center;
      gap: 14px;
      padding: 12px 8px;
    }
    .panel-label {
      font-size: clamp(16px, 1.7vw, 28px);
      letter-spacing: 1.2px;
    }
    .turn-indicator {
      width: 66%;
      aspect-ratio: 1;
      height: auto;
      border-width: 5px;
    }
    .panel .your-turn {
      font-size: clamp(13px, 1.2vw, 22px);
      min-height: 20px;
    }

    #board-wrap { padding: 10px; }
    #board {
      border-width: 6px;
      border-radius: 18px;
      padding: 10px;
      gap: 10px;
      box-shadow: 0 0 60px rgba(0, 100, 200, 0.3);
    }

    #mode-select .mode-btns {
      grid-template-columns: 1fr;
      width: min(88vw, 560px);
      gap: 12px;
    }
    #mode-select .mode-btns.link-disabled {
      grid-template-columns: 1fr;
      width: min(88vw, 560px);
    }
    .mode-btn {
      font-size: clamp(20px, 1.9vw, 32px);
      min-height: clamp(96px, 14vh, 132px);
      padding: 16px 14px;
    }
    .mode-btn .mode-sub { font-size: clamp(13px, 1vw, 18px); }

    #ready-overlay {
      flex-direction: row;
      gap: 2vw;
    }
    .ready-btn {
      width: auto;
      min-width: 260px;
      min-height: 140px;
      padding: 20px 22px;
    }

    #match-end-actions {
      grid-template-columns: repeat(3, minmax(180px, 1fr));
      width: min(92vw, 960px);
      gap: 10px;
    }
  }

  @media (max-width: 899px) and (orientation: landscape) and (max-height: 540px) {
    #topbar {
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 6px 10px;
    }

    #topbar-row1,
    #topbar-row2 {
      width: auto;
      gap: 6px;
      flex-wrap: nowrap;
    }
    #topbar-row1 { justify-content: flex-start; }
    #topbar-row2 { justify-content: flex-end; }

    #main { flex-direction: row; }
    .panel {
      width: 13%;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
      padding: 6px 4px;
    }
    .turn-indicator {
      width: 28px;
      height: 28px;
    }
    .panel .your-turn {
      font-size: 11px;
      min-height: 14px;
    }
  }

  @media (max-width: 399px) {
    #topbar-row2 { gap: 6px; }
    #topbar-row2 button { padding: 0 9px; }
    #share-btn, #difficulty-btn { font-size: 12px; }
    #score { font-size: 19px; }
  }
</style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <div id="topbar-row1">
    <button id="menu-btn" title="Open mode menu">MENU</button>
    <button id="reset-btn" title="Reset game">RESET</button>
    <div id="score"><span class="red" id="score-red">0</span><span class="dash">—</span><span class="yel" id="score-yel">0</span></div>
    <button id="sound-btn" title="Toggle sound">🔊</button>
  </div>
  <div id="topbar-row2">
    <button id="share-btn" title="Share turn link">SHARE MOVE</button>
    <select id="difficulty-btn" aria-label="Computer difficulty">
      <option value="ROOKIE">ROOKIE</option>
      <option value="PRO" selected>PRO</option>
      <option value="MASTER">MASTER</option>
    </select>
  </div>
</div>

<!-- Main play area -->
<div id="main">
  <div class="panel panel-left" id="panel-left">
    <div class="panel-label" id="label-left">PLAYER 1</div>
    <div class="turn-indicator"></div>
    <div class="your-turn">YOUR TURN</div>
  </div>

  <div id="board-wrap">
    <div id="board-container">
      <div id="board"></div>
      <svg id="winline"></svg>
      <div id="announce"></div>
    </div>

    <!-- Mode select overlay -->
    <div class="overlay" id="mode-select">
      <h1>CONNECT 4</h1>

<script>
// ============================================================
// SOUND SYSTEM (Web Audio — no files needed)
// ============================================================
let audioCtx = null;
let soundOn = true;
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function envTone(freq, start, dur, type='sine', peak=0.25, endFreq=null) {
  if (!soundOn) return;
  const ctx = getCtx();
  const t0 = ctx.currentTime + start;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  if (endFreq != null) osc.frequency.exponentialRampToValueAtTime(endFreq, t0 + dur);
  gain.gain.setValueAtTime(0, t0);
  gain.gain.linearRampToValueAtTime(peak, t0 + 0.008);
  gain.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  osc.connect(gain).connect(ctx.destination);
  osc.start(t0);
  osc.stop(t0 + dur + 0.02);
}
function noiseBurst(start, dur, peak=0.2, filterFreq=2000) {
  if (!soundOn) return;
  const ctx = getCtx();
  const t0 = ctx.currentTime + start;
  const bufferSize = Math.floor(ctx.sampleRate * dur);
  const buf = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i/bufferSize);
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = filterFreq;
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(peak, t0);
  gain.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  src.connect(filter).connect(gain).connect(ctx.destination);
  src.start(t0);
  src.stop(t0 + dur);
}

// Swoosh during drop (falling whoosh)
function sfxDrop() {
  envTone(600, 0, 0.32, 'sawtooth', 0.08, 180);
  noiseBurst(0, 0.3, 0.05, 1200);
}
// Satisfying thud when piece lands
function sfxLand() {
  envTone(120, 0, 0.18, 'sine', 0.5, 60);
  envTone(80, 0, 0.22, 'triangle', 0.35, 40);
  noiseBurst(0, 0.08, 0.18, 800);
}
// Hover tick
function sfxHover() {
  envTone(1200, 0, 0.04, 'square', 0.05);
}
// Round win fanfare (quick 3-note)
function sfxRoundWin() {
  envTone(523, 0.00, 0.18, 'triangle', 0.3);   // C5
  envTone(659, 0.12, 0.18, 'triangle', 0.3);   // E5
  envTone(784, 0.24, 0.30, 'triangle', 0.35);  // G5
  envTone(1047, 0.24, 0.30, 'sine', 0.25);     // C6
}
// Match win — bigger fanfare
function sfxMatchWin() {
  envTone(523, 0.00, 0.15, 'triangle', 0.3);
  envTone(659, 0.12, 0.15, 'triangle', 0.3);
  envTone(784, 0.24, 0.15, 'triangle', 0.3);
  envTone(1047, 0.36, 0.40, 'triangle', 0.4);
  envTone(1319, 0.36, 0.40, 'sine', 0.3);      // E6
  envTone(1568, 0.52, 0.50, 'sine', 0.3);      // G6
  noiseBurst(0.36, 0.6, 0.1, 5000);            // sparkle
}
// Invalid / blocked
function sfxBlock() {
  envTone(180, 0, 0.15, 'square', 0.2, 120);
}
// Ready tap
function sfxReady() {
  envTone(660, 0, 0.1, 'sine', 0.25);
  envTone(880, 0.06, 0.12, 'sine', 0.25);
}
// Button click
function sfxClick() {
  envTone(800, 0, 0.05, 'square', 0.1);
}
// CPU thinking hum (single soft ping)
function sfxCpuThink() {
  envTone(440, 0, 0.08, 'sine', 0.08);
}

// ============================================================
// SPEECH — spoken announcements
// ============================================================
let cachedVoice = null;
function pickMaleVoice() {
  if (!('speechSynthesis' in window)) return null;
  const voices = window.speechSynthesis.getVoices();
  if (!voices.length) return null;
  // Known deep/male voices across Chrome, Safari, Edge, Firefox (Mac/Win)
  const malePatterns = [
    /Daniel/i, /Alex\b/i, /Fred/i, /Oliver/i, /Arthur/i, /Aaron/i,
    /Google UK English Male/i, /Google US English.*Male/i,
    /Microsoft (David|Mark|George|Guy|Ryan)/i,
    /\bmale\b/i
  ];
  for (const pat of malePatterns) {
    const v = voices.find(v => /^en/i.test(v.lang) && pat.test(v.name));
    if (v) return v;
  }
  // Fallback: any English voice NOT obviously female
  const femaleHint = /female|samantha|victoria|karen|tessa|fiona|zira|hazel|susan|allison|ava|serena/i;
  const fallback = voices.find(v => /^en/i.test(v.lang) && !femaleHint.test(v.name));
  return fallback || voices.find(v => /^en/i.test(v.lang)) || null;
}

function speak(text, opts = {}) {
  if (!soundOn) return;
  if (!('speechSynthesis' in window)) return;
  try {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = opts.rate ?? 0.88;
    u.pitch = opts.pitch ?? 0.55; // Deeper
    u.volume = opts.volume ?? 1.0;
    if (!cachedVoice) cachedVoice = pickMaleVoice();
    if (cachedVoice) u.voice = cachedVoice;
    window.speechSynthesis.speak(u);
  } catch (e) {}
}
// Voices load asynchronously in Chrome — refresh cache when they arrive
if ('speechSynthesis' in window) {
  window.speechSynthesis.onvoiceschanged = () => { cachedVoice = pickMaleVoice(); };
  // Also try immediately in case they're already loaded
  setTimeout(() => { cachedVoice = pickMaleVoice(); }, 200);
}

// ============================================================
// CONNECT 4 — SMARTBOARD EDITION
// State
// ============================================================
const ROWS = 6, COLS = 7;
const EMPTY = 0, RED = 1, YEL = 2;

let board = [];                 // board[r][c] -> 0 | 1 | 2
let currentPlayer = RED;        // whose turn
let startingPlayer = RED;       // alternates each round
let scores = { 1: 0, 2: 0 };    // round wins in current match
let gameOver = false;           // round ended
let busy = false;               // piece animating or AI thinking
let onePlayer = false;          // vs CPU?
let humanSide = RED;            // which color the human plays in 1P mode
let difficulty = 'PRO';         // ROOKIE / PRO / MASTER
let readyState = { 1: false, 2: false };
let moveHistory = [];           // array of played columns, 0-6
let asyncMode = false;          // loaded from share link
let asyncSeat = null;           // 'r' (red), 'y' (yellow), or null (unlocked spectator)
const ASYNC_REMINDER_DELAY_MS = 2 * 60 * 1000; // "few minutes"
let asyncReminderTimer = null;
let selectedMode = 'cpu';       // cpu | pass | link
const MODE_STORAGE_KEY = 'connect4_mode_pref_v1';
const ENABLE_LINK_MODE = true; // async text-link mode is live

function seatForPlayer(player) {
  return player === RED ? 'r' : 'y';
}

function playerForSeat(seat) {
  if (seat === 'r') return RED;
  if (seat === 'y') return YEL;
  return null;
}

function turnPlayerForMoves(moves) {
  return (moves.length % 2 === 0) ? RED : YEL;
}

function canLocalMoveInAsync() {
  if (!asyncMode) return true;
  const allowed = playerForSeat(asyncSeat);
  if (allowed == null) return true;
  return currentPlayer === allowed;
}

const sessionByMode = { cpu: null, pass: null, link: null };

function currentModeKey() {
  if (asyncMode) return 'link';
  if (onePlayer) return 'cpu';
  return 'pass';
}

function boardHasAnyPiece() {
  return moveHistory.length > 0;
}

function snapshotCurrentSession(modeKey = currentModeKey()) {
  if (gameOver) return;
  if (!boardHasAnyPiece()) return;
  sessionByMode[modeKey] = {
    mode: modeKey,
    board: board.map(row => row.slice()),
    currentPlayer,
    startingPlayer,
    scores: { ...scores },
    onePlayer,
    asyncMode,
    asyncSeat,
    humanSide,
    difficulty,
    moveHistory: moveHistory.slice()
  };
}

function renderPiecesFromBoardArray() {
  clearBoardDOM();
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const v = board[r][c];
      if (v === EMPTY) continue;
      const cell = boardEl.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
      if (!cell) continue;
      const piece = document.createElement('div');
      piece.className = 'piece ' + (v === RED ? 'red' : 'yel');
      cell.appendChild(piece);
    }
  }
}

function restoreSession(modeKey) {
  const snap = sessionByMode[modeKey];
  if (!snap) return false;

  selectedMode = modeKey;
  onePlayer = snap.onePlayer;
  asyncMode = snap.asyncMode;
  asyncSeat = snap.asyncSeat;
  humanSide = snap.humanSide;
  difficulty = snap.difficulty;
  const difficultyEl = document.getElementById('difficulty-btn');
  if (difficultyEl) difficultyEl.value = difficulty;

  board = snap.board.map(row => row.slice());
  currentPlayer = snap.currentPlayer;
  startingPlayer = snap.startingPlayer;
  scores = { ...snap.scores };
  moveHistory = snap.moveHistory.slice();

  gameOver = false;
  busy = false;

  if (onePlayer) updateCpuLabels();
  else {
    document.getElementById('label-left').textContent = 'PLAYER 1';
    document.getElementById('label-right').textContent = 'PLAYER 2';
  }

  renderPiecesFromBoardArray();
  updateScore();
  setActivePanel();
  hideAnnouncement();
  hideAsyncTurnOverlay();
  document.getElementById('mode-select').classList.add('hidden');
  document.getElementById('ready-overlay').classList.add('hidden');
  document.getElementById('cpu-side-select').classList.add('hidden');
  document.getElementById('match-end').classList.add('hidden');
  setControlVisibility();
  updateShareHash();
  if (asyncMode) {
    if (canLocalMoveInAsync()) showAsyncYourTurnPrompt(true);
    else showAsyncWaitingPrompt();
  }
  return true;
}

function openModeMenuPreserve() {
  const modeVisible = !document.getElementById('mode-select').classList.contains('hidden');
  if (modeVisible) return;
  hideAnnouncement();
  hideAsyncTurnOverlay();
  snapshotCurrentSession();
  document.getElementById('ready-overlay').classList.add('hidden');
  document.getElementById('cpu-side-select').classList.add('hidden');
  document.getElementById('match-end').classList.add('hidden');
  document.getElementById('mode-select').classList.remove('hidden');
  const mode = currentModeKey();
  selectedMode = mode;
  updateModeMenuHighlight(mode);
}

function clearAsyncReminderTimer() {
  if (!asyncReminderTimer) return;
  clearTimeout(asyncReminderTimer);
  asyncReminderTimer = null;
}

function hideAsyncTurnOverlay() {
  clearAsyncReminderTimer();
  document.getElementById('async-turn-overlay').classList.add('hidden');
}

function showAsyncOverlayState({
  title,
  sub,
  shareLabel = null,
  showRemind = false,
  closeLabel = 'CLOSE',
  showClose = true
}) {
  const overlay = document.getElementById('async-turn-overlay');
  const titleEl = document.getElementById('async-turn-title');
  const subEl = document.getElementById('async-turn-sub');
  const shareBtn = document.getElementById('async-share-btn');
  const remindBtn = document.getElementById('async-remind-btn');
  const closeBtn = document.getElementById('async-close-btn');
  titleEl.textContent = title;
  subEl.textContent = sub;
  if (shareLabel) {
    shareBtn.textContent = shareLabel;
    shareBtn.classList.remove('hidden');
  } else {
    shareBtn.classList.add('hidden');
  }
  remindBtn.classList.toggle('hidden', !showRemind);
  closeBtn.classList.toggle('hidden', !showClose);
  closeBtn.textContent = closeLabel;
  overlay.classList.remove('hidden');
}

function scheduleAsyncReminderOption() {
  clearAsyncReminderTimer();
  asyncReminderTimer = setTimeout(() => {
    const remindBtn = document.getElementById('async-remind-btn');
    remindBtn.classList.remove('hidden');
    showAnnouncement('STILL WAITING?', 'SEND A QUICK REMINDER', 'draw', 1400);
  }, ASYNC_REMINDER_DELAY_MS);
}

function showAsyncSharePrompt() {
  hideAnnouncement();
  showAsyncOverlayState({
    title: 'SEND YOUR TURN',
    sub: 'Share this link so the other player can make the next move.',
    shareLabel: 'SHARE TURN LINK',
    showRemind: false,
    showClose: false
  });
}

function showAsyncWaitingPrompt() {
  hideAnnouncement();
  showAsyncOverlayState({
    title: 'WAITING FOR OPPONENT',
    sub: 'Turn shared. You can resend the link anytime.',
    shareLabel: 'RESHARE LINK',
    showRemind: false,
    closeLabel: 'CLOSE'
  });
  scheduleAsyncReminderOption();
}

function showAsyncYourTurnPrompt(forceModal = false) {
  if (!forceModal) {
    showAnnouncement('YOUR TURN', 'MAKE YOUR MOVE', currentPlayer === RED ? 'red' : 'yel', 1400);
    return;
  }
  hideAnnouncement();
  showAsyncOverlayState({
    title: 'YOUR TURN',
    sub: 'Your friend moved. Drop your chip now.',
    shareLabel: null,
    showRemind: false,
    closeLabel: 'PLAY NOW'
  });
}

function savePreferredMode(mode) {
  try { localStorage.setItem(MODE_STORAGE_KEY, mode); } catch (e) {}
}

function loadPreferredMode() {
  try {
    const mode = localStorage.getItem(MODE_STORAGE_KEY);
    if (mode === 'cpu' || mode === 'pass' || mode === 'link') return mode;
  } catch (e) {}
  return 'cpu';
}

function updateModeMenuHighlight(mode = null) {
  const rawTarget = mode || selectedMode || loadPreferredMode();
  const target = (!ENABLE_LINK_MODE && rawTarget === 'link') ? 'cpu' : rawTarget;
  document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('preferred'));
  const el = document.getElementById(`mode-${target}`);
  if (el) el.classList.add('preferred');
}

function setControlVisibility() {
  const shareBtn = document.getElementById('share-btn');
  const difficultyBtn = document.getElementById('difficulty-btn');
  const challengeBtn = document.getElementById('challenge-link-btn');
  const linkModeBtn = document.getElementById('mode-link');
  const modeBtnsWrap = document.querySelector('#mode-select .mode-btns');
  if (linkModeBtn) linkModeBtn.style.display = ENABLE_LINK_MODE ? '' : 'none';
  if (modeBtnsWrap) modeBtnsWrap.classList.toggle('link-disabled', !ENABLE_LINK_MODE);
  if (shareBtn) shareBtn.style.display = asyncMode ? '' : 'none';
  if (difficultyBtn) difficultyBtn.style.display = onePlayer ? '' : 'none';
  if (challengeBtn) challengeBtn.classList.toggle('hidden', !(ENABLE_LINK_MODE && onePlayer && !asyncMode));
  if (!asyncMode) hideAsyncTurnOverlay();
  requestAnimationFrame(sizeBoard);
}

function updateCpuLabels() {
  if (humanSide === RED) {
    document.getElementById('label-left').textContent = 'YOU';
    document.getElementById('label-right').textContent = 'CPU';
  } else {
    document.getElementById('label-left').textContent = 'CPU';
    document.getElementById('label-right').textContent = 'YOU';
  }
}

function applyMode(mode, persist = true) {
  selectedMode = mode;
  if (mode === 'cpu') {
    asyncMode = false;
    asyncSeat = null;
    onePlayer = true;
    updateCpuLabels();
  } else if (mode === 'pass') {
    asyncMode = false;
    asyncSeat = null;
    onePlayer = false;
    document.getElementById('label-left').textContent = 'PLAYER 1';
    document.getElementById('label-right').textContent = 'PLAYER 2';
  } else {
    asyncMode = true;
    asyncSeat = null;
    onePlayer = false;
    document.getElementById('label-left').textContent = 'PLAYER 1';
    document.getElementById('label-right').textContent = 'PLAYER 2';
  }
  if (persist) savePreferredMode(mode);
  updateModeMenuHighlight(mode);
  setControlVisibility();
}

// ============================================================
// Board DOM
// ============================================================
const boardEl = document.getElementById('board');
function buildBoard() {
  boardEl.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r;
      cell.dataset.c = c;
      boardEl.appendChild(cell);
    }
  }
  // Preview piece shown above hovered column
  const preview = document.createElement('div');
  preview.className = 'preview-piece red hidden';
  preview.id = 'preview-piece';
  document.getElementById('board-container').appendChild(preview);
  wireBoardInput();
  sizeBoard();
}

function wireBoardInput() {
  // Click / tap / move on the board — map pointer X to column
  const handlePointer = (e, isClick) => {
    if (busy || gameOver) return;
    if (isCpuTurn()) return;
    const rect = boardEl.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    if (x < 0 || x > rect.width) return hidePreview();
    const col = Math.floor((x / rect.width) * COLS);
    if (col < 0 || col >= COLS) return hidePreview();
    if (board[0][col] !== EMPTY) { hidePreview(); return; }
    showPreview(col);
    if (isClick) {
      handleColumnTap(col);
      hidePreview();
    }
  };
  boardEl.addEventListener('mousemove', (e) => handlePointer(e, false));
  boardEl.addEventListener('mouseleave', () => hidePreview());
  boardEl.addEventListener('click', (e) => handlePointer(e, true));
  boardEl.addEventListener('touchstart', (e) => { e.preventDefault(); handlePointer(e, true); }, { passive: false });
}

let lastPreviewCol = -1;
function showPreview(col) {
  const preview = document.getElementById('preview-piece');
  if (col !== lastPreviewCol) { sfxHover(); lastPreviewCol = col; }
  const firstCell = boardEl.querySelector(`.cell[data-r="0"][data-c="${col}"]`);
  if (!firstCell) return;
  const bRect = boardEl.getBoundingClientRect();
  const cRect = firstCell.getBoundingClientRect();
  const size = cRect.width * 0.88;
  preview.style.width = size + 'px';
  preview.style.height = size + 'px';
  preview.style.left = (cRect.left - bRect.left + (cRect.width - size)/2) + 'px';
  preview.style.top = (cRect.top - bRect.top - size - 8) + 'px';
  preview.className = 'preview-piece ' + (currentPlayer === RED ? 'red' : 'yel');
}
function hidePreview() {
  const preview = document.getElementById('preview-piece');
  if (preview) preview.classList.add('hidden');
  lastPreviewCol = -1;
}
function sizeBoard() {
  const wrap = document.getElementById('board-wrap');
  const maxW = wrap.clientWidth - 20;
  const maxH = wrap.clientHeight - 20;
  // board aspect 7:6
  let w = maxW, h = (w / 7) * 6;
  if (h > maxH) { h = maxH; w = (h / 6) * 7; }
  boardEl.style.width = w + 'px';
  boardEl.style.height = h + 'px';
}
window.addEventListener('resize', sizeBoard);
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', sizeBoard);
}

function resetBoardArray() {
  board = [];
  for (let r = 0; r < ROWS; r++) {
    const row = [];
    for (let c = 0; c < COLS; c++) row.push(EMPTY);
    board.push(row);
  }
}

function clearBoardDOM() {
  document.querySelectorAll('.cell').forEach(c => { c.innerHTML = ''; });
  document.getElementById('winline').innerHTML = '';
}

// ============================================================
// Drop logic
// ============================================================
function lowestEmptyRow(b, col) {
  for (let r = ROWS - 1; r >= 0; r--) {
    if (b[r][col] === EMPTY) return r;
  }
  return -1;
}

function dropPiece(col, player, animate = true) {
  const r = lowestEmptyRow(board, col);
  if (r < 0) return false;
  board[r][col] = player;
  // DOM
  const cell = boardEl.querySelector(`.cell[data-r="${r}"][data-c="${col}"]`);
  const piece = document.createElement('div');
  piece.className = 'piece ' + (player === RED ? 'red' : 'yel') + (animate ? ' drop' : '');
  const dropFromPct = -((r + 1) * 110);
  piece.style.setProperty('--drop-from', dropFromPct + '%');
  cell.appendChild(piece);
  return { r, c: col };
}

// ============================================================
// Win detection
// ============================================================
function checkWin(b, player) {
  // Returns array of 4 [r,c] coords, or null
  // Horizontal
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c <= COLS - 4; c++) {
      if (b[r][c]===player && b[r][c+1]===player && b[r][c+2]===player && b[r][c+3]===player)
        return [[r,c],[r,c+1],[r,c+2],[r,c+3]];
    }
  }
  // Vertical
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r <= ROWS - 4; r++) {
      if (b[r][c]===player && b[r+1][c]===player && b[r+2][c]===player && b[r+3][c]===player)
        return [[r,c],[r+1,c],[r+2,c],[r+3,c]];
    }
  }
  // Diagonal down-right
  for (let r = 0; r <= ROWS - 4; r++) {
    for (let c = 0; c <= COLS - 4; c++) {
      if (b[r][c]===player && b[r+1][c+1]===player && b[r+2][c+2]===player && b[r+3][c+3]===player)
        return [[r,c],[r+1,c+1],[r+2,c+2],[r+3,c+3]];
    }
  }
  // Diagonal up-right
  for (let r = 3; r < ROWS; r++) {
    for (let c = 0; c <= COLS - 4; c++) {
      if (b[r][c]===player && b[r-1][c+1]===player && b[r-2][c+2]===player && b[r-3][c+3]===player)
        return [[r,c],[r-1,c+1],[r-2,c+2],[r-3,c+3]];
    }
  }
  return null;
}

function isFull(b) {
  for (let c = 0; c < COLS; c++) if (b[0][c] === EMPTY) return false;
  return true;
}

// ============================================================
// AI
// ============================================================
function legalCols(b) {
  const out = [];
  for (let c = 0; c < COLS; c++) if (b[0][c] === EMPTY) out.push(c);
  return out;
}

function cloneBoard(b) { return b.map(row => row.slice()); }

function simulateDrop(b, col, player) {
  const nb = cloneBoard(b);
  const r = lowestEmptyRow(nb, col);
  if (r < 0) return null;
  nb[r][col] = player;
  return nb;
}

function findImmediateWin(b, player) {
  for (const c of legalCols(b)) {
    const nb = simulateDrop(b, c, player);
    if (checkWin(nb, player)) return c;
  }
  return -1;
}

// ROOKIE: 70% random, 30% block immediate loss
function aiRookie(b, me, opp) {
  if (Math.random() < 0.3) {
    const block = findImmediateWin(b, opp);
    if (block >= 0) return block;
  }
  const cols = legalCols(b);
  return cols[Math.floor(Math.random() * cols.length)];
}

// PRO: win > block > center-biased random
function aiPro(b, me, opp) {
  const win = findImmediateWin(b, me);
  if (win >= 0) return win;
  const block = findImmediateWin(b, opp);
  if (block >= 0) return block;
  const cols = legalCols(b);
  // Center bias: weight by proximity to col 3
  const weights = cols.map(c => 4 - Math.abs(3 - c));
  const total = weights.reduce((a,b)=>a+b,0);
  let r = Math.random() * total;
  for (let i = 0; i < cols.length; i++) {
    r -= weights[i];
    if (r <= 0) return cols[i];
  }
  return cols[0];
}

// MASTER: minimax alpha-beta
function scorePosition(b, player) {
  const opp = player === RED ? YEL : RED;
  let score = 0;
  // Center column preference
  for (let r = 0; r < ROWS; r++) if (b[r][3] === player) score += 3;
  // Score windows of 4
  const scoreWindow = (win) => {
    const me = win.filter(v => v === player).length;
    const op = win.filter(v => v === opp).length;
    const em = win.filter(v => v === EMPTY).length;
    let s = 0;
    if (me === 4) s += 100;
    else if (me === 3 && em === 1) s += 8;
    else if (me === 2 && em === 2) s += 3;
    if (op === 3 && em === 1) s -= 10;
    return s;
  };
  // Horizontal
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c <= COLS-4; c++)
      score += scoreWindow([b[r][c],b[r][c+1],b[r][c+2],b[r][c+3]]);
  // Vertical
  for (let c = 0; c < COLS; c++)
    for (let r = 0; r <= ROWS-4; r++)
      score += scoreWindow([b[r][c],b[r+1][c],b[r+2][c],b[r+3][c]]);
  // Diag dr
  for (let r = 0; r <= ROWS-4; r++)
    for (let c = 0; c <= COLS-4; c++)
      score += scoreWindow([b[r][c],b[r+1][c+1],b[r+2][c+2],b[r+3][c+3]]);
  // Diag ur
  for (let r = 3; r < ROWS; r++)
    for (let c = 0; c <= COLS-4; c++)
      score += scoreWindow([b[r][c],b[r-1][c+1],b[r-2][c+2],b[r-3][c+3]]);
  return score;
}

function minimax(b, depth, alpha, beta, maximizing, me, opp, deadline) {
  if (performance.now() > deadline) return [null, scorePosition(b, me)];
  const winMe = checkWin(b, me);
  const winOp = checkWin(b, opp);
  if (winMe) return [null, 1000000 + depth];
  if (winOp) return [null, -1000000 - depth];
  if (isFull(b) || depth === 0) return [null, scorePosition(b, me)];
  const cols = legalCols(b).sort((a,c) => Math.abs(3-a) - Math.abs(3-c));
  let bestCol = cols[0];
  if (maximizing) {
    let value = -Infinity;
    for (const c of cols) {
      const nb = simulateDrop(b, c, me);
      const [, v] = minimax(nb, depth-1, alpha, beta, false, me, opp, deadline);
      if (v > value) { value = v; bestCol = c; }
      alpha = Math.max(alpha, value);
      if (alpha >= beta) break;
    }
    return [bestCol, value];
  } else {
    let value = Infinity;
    for (const c of cols) {
      const nb = simulateDrop(b, c, opp);
      const [, v] = minimax(nb, depth-1, alpha, beta, true, me, opp, deadline);
      if (v < value) { value = v; bestCol = c; }
      beta = Math.min(beta, value);
      if (alpha >= beta) break;
    }
    return [bestCol, value];
  }
}

function aiMaster(b, me, opp) {
  const deadline = performance.now() + 500;
  const [col] = minimax(b, 6, -Infinity, Infinity, true, me, opp, deadline);
  if (col == null) return aiPro(b, me, opp);
  return col;
}

function aiChoose(b, me, opp) {
  if (difficulty === 'ROOKIE') return aiRookie(b, me, opp);
  if (difficulty === 'PRO') return aiPro(b, me, opp);
  return aiMaster(b, me, opp);
}

// ============================================================
// Turn handling
// ============================================================
function setActivePanel() {
  const left = document.getElementById('panel-left');
  const right = document.getElementById('panel-right');
  // Left is always RED, Right is always YEL
  if (currentPlayer === RED) { left.classList.remove('dim'); right.classList.add('dim'); }
  else { right.classList.remove('dim'); left.classList.add('dim'); }
}

function isCpuTurn() {
  return onePlayer && currentPlayer !== humanSide;
}

function handleColumnTap(col) {
  if (busy || gameOver) return;
  if (isCpuTurn()) return;
  if (!canLocalMoveInAsync()) {
    sfxBlock();
    showAsyncWaitingPrompt();
    return;
  }
  if (board[0][col] !== EMPTY) return;
  doMove(col);
}

function doMove(col) {
  busy = true;
  sfxDrop();
  const placed = dropPiece(col, currentPlayer);
  if (!placed) {
    busy = false;
    return;
  }
  moveHistory.push(col);
  updateShareHash();
  // Landing thud near end of animation.
  setTimeout(sfxLand, 380);
  // Wait for drop animation.
  setTimeout(() => {
    const winCoords = checkWin(board, currentPlayer);
    if (winCoords) {
      endRound(currentPlayer, winCoords);
      return;
    }
    if (isFull(board)) {
      endRound(0, null); // draw
      return;
    }
    currentPlayer = (currentPlayer === RED) ? YEL : RED;
    setActivePanel();
    busy = false;
    if (asyncMode) {
      if (canLocalMoveInAsync()) showAsyncYourTurnPrompt();
      else showAsyncSharePrompt();
      return;
    }
    if (isCpuTurn()) scheduleCpuMove();
  }, 480);
}

function scheduleCpuMove() {
  busy = true;
  showThinking(true);
  let delay;
  if (difficulty === 'MASTER') delay = 700 + Math.random() * 700;
  else delay = 600 + Math.random() * 400;
  setTimeout(() => {
    const me = currentPlayer;
    const opp = me === RED ? YEL : RED;
    const col = aiChoose(board, me, opp);
    showThinking(false);
    doMove(col);
  }, delay);
}

function showThinking(on) {
  const rightLabel = document.getElementById('label-right');
  const leftLabel = document.getElementById('label-left');
  const cpuPanel = humanSide === RED ? document.getElementById('panel-right') : document.getElementById('panel-left');
  const cpuLabel = humanSide === RED ? rightLabel : leftLabel;
  // Just animate the label when thinking
  if (on) cpuLabel.style.animation = 'pulse 1s infinite ease-in-out';
  else cpuLabel.style.animation = '';
}

// Round / match end
// ============================================================
function roundWinnerName(winner) {
  if (onePlayer) {
    if (winner === humanSide) return 'You';
    return 'Computer';
  }
  return winner === RED ? 'Red' : 'Yellow';
}

let announceHideTimer = null;
let announceForceHideTimer = null;
let announceRafId = null;
function clearAnnouncementTimer() {
  if (announceRafId != null) {
    cancelAnimationFrame(announceRafId);
    announceRafId = null;
  }
  if (announceHideTimer) {
    clearTimeout(announceHideTimer);
    announceHideTimer = null;
  }
  if (announceForceHideTimer) {
    clearTimeout(announceForceHideTimer);
    announceForceHideTimer = null;
  }
}

function showAnnouncement(title, sub, colorClass, autoHideMs = 0) {
  clearAnnouncementTimer();
  const el = document.getElementById('announce');
  el.className = '';
  el.classList.add(colorClass);
  el.innerHTML = title + (sub ? `<span class="sub">${sub}</span>` : '');
  // Trigger entry animation
  announceRafId = requestAnimationFrame(() => {
    announceRafId = null;
    el.classList.add('show');
  });
  if (autoHideMs > 0) {
    announceHideTimer = setTimeout(() => {
      hideAnnouncement();
    }, autoHideMs);
    // Safety fallback: force a second hide in case first timer gets interrupted.
    announceForceHideTimer = setTimeout(() => {
      hideAnnouncement();
    }, autoHideMs + 1200);
  }
}
function hideAnnouncement() {
  clearAnnouncementTimer();
  const el = document.getElementById('announce');
  el.classList.remove('show');
}

function endRound(winner, winCoords) {
  gameOver = true;
  hideAsyncTurnOverlay();
  if (winner !== 0) {
    scores[winner]++;
    updateScore();
    setTimeout(sfxRoundWin, 200);
    // Highlight winning pieces
    const winSet = new Set(winCoords.map(([r,c]) => r+','+c));
    document.querySelectorAll('.cell').forEach(cell => {
      const r = cell.dataset.r, c = cell.dataset.c;
      const piece = cell.querySelector('.piece');
      if (!piece) return;
      if (winSet.has(r+','+c)) piece.classList.add('win');
      else piece.classList.add('lose');
    });
    drawWinLine(winCoords);
    // Announcement only if match isn't ending (match-end has its own overlay)
    const willBeMatchEnd = scores[RED] >= 3 || scores[YEL] >= 3;
    if (!willBeMatchEnd) {
      const who = roundWinnerName(winner);
      const colorClass = winner === RED ? 'red' : 'yel';
      let title, speech;
      if (onePlayer && winner === humanSide) {
        title = 'YOU WIN!'; speech = 'You win the round!';
      } else if (onePlayer) {
        title = 'COMPUTER WINS'; speech = 'The computer wins the round.';
      } else {
        title = (winner === RED ? 'RED' : 'YELLOW') + ' WINS!';
        speech = who + ' wins the round!';
      }
      setTimeout(() => {
        showAnnouncement(title, 'ROUND ' + (scores[RED] + scores[YEL]), colorClass);
        speak(speech);
      }, 600);
    }
  } else {
    setTimeout(() => {
      showAnnouncement("IT'S A DRAW", 'NO WINNER THIS ROUND', 'draw');
      speak("It's a draw!");
    }, 300);
  }
  // Async mode is one persistent round, not first-to-3 local match flow.
  if (asyncMode) return;
  // Check match end (first to 3)
  if (scores[RED] >= 3 || scores[YEL] >= 3) {
    setTimeout(showMatchEnd, 1500);
  } else {
    setTimeout(nextRound, 1800);
  }
}

function drawWinLine(coords) {
  const svg = document.getElementById('winline');
  const bRect = boardEl.getBoundingClientRect();
  const wrapRect = document.getElementById('board-wrap').getBoundingClientRect();
  svg.style.left = (bRect.left - wrapRect.left) + 'px';
  svg.style.top = (bRect.top - wrapRect.top) + 'px';
  svg.setAttribute('width', bRect.width);
  svg.setAttribute('height', bRect.height);
  const cells = coords.map(([r,c]) => {
    const cell = boardEl.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
    const rect = cell.getBoundingClientRect();
    return { x: rect.left - bRect.left + rect.width/2, y: rect.top - bRect.top + rect.height/2 };
  });
  const first = cells[0], last = cells[cells.length-1];
  svg.innerHTML = `<line x1="${first.x}" y1="${first.y}" x2="${last.x}" y2="${last.y}" />`;
}

function updateScore() {
  document.getElementById('score-red').textContent = scores[RED];
  document.getElementById('score-yel').textContent = scores[YEL];
}

function nextRound() {
  hideAnnouncement();
  resetBoardArray();
  clearBoardDOM();
  moveHistory = [];
  updateShareHash();
  gameOver = false;
  busy = false;
  startingPlayer = (startingPlayer === RED) ? YEL : RED;
  currentPlayer = startingPlayer;
  if (onePlayer) {
    // Skip ready overlay in 1P mode
    setActivePanel();
    if (isCpuTurn()) scheduleCpuMove();
  } else {
    showReadyOverlay();
  }
}

function showMatchEnd() {
  hideAnnouncement();
  sfxMatchWin();
  const winner = scores[RED] >= 3 ? RED : YEL;
  let text, speech;
  if (onePlayer) {
    if (winner === humanSide) { text = 'YOU WIN THE MATCH!'; speech = 'Congratulations! You win the match!'; }
    else { text = 'COMPUTER WINS THE MATCH'; speech = 'The computer wins the match. Good try!'; }
  } else {
    if (winner === RED) { text = 'RED WINS THE MATCH!'; speech = 'Red wins the match! Well played!'; }
    else { text = 'YELLOW WINS THE MATCH!'; speech = 'Yellow wins the match! Well played!'; }
  }
  document.getElementById('match-end-text').textContent = text;
  document.getElementById('match-end-text').style.color = winner === RED ? '#ff3b47' : '#ffd028';
  document.getElementById('match-end').classList.remove('hidden');
  // Speak after the fanfare peaks so they don't clash
  setTimeout(() => speak(speech, { rate: 0.9, pitch: 1.15 }), 900);
}

// ============================================================
// Share link + async position loading
// ============================================================
function encodeMoves(moves) {
  return moves.map(c => String(c + 1)).join('');
}

function decodeMoves(raw) {
  if (raw == null) return null;
  if (raw === '') return [];
  const out = [];
  for (const ch of raw) {
    if (ch < '1' || ch > '7') return null;
    out.push(Number(ch) - 1);
  }
  if (out.length > ROWS * COLS) return null;
  return out;
}

function shareHashFromMoves(moves, seat = null) {
  const params = new URLSearchParams();
  params.set('a', '1');
  params.set('m', encodeMoves(moves));
  const targetSeat = (seat === 'r' || seat === 'y') ? seat : seatForPlayer(turnPlayerForMoves(moves));
  params.set('p', targetSeat);
  return params.toString();
}

function buildShareLink() {
  const url = new URL(window.location.href);
  url.hash = shareHashFromMoves(moveHistory, seatForPlayer(turnPlayerForMoves(moveHistory)));
  return url.toString();
}

function updateShareHash() {
  if (!asyncMode) {
    if (window.location.hash) {
      history.replaceState(null, '', window.location.pathname + window.location.search);
    }
    return;
  }
  history.replaceState(null, '', '#' + shareHashFromMoves(moveHistory, seatForPlayer(turnPlayerForMoves(moveHistory))));
}

function detectWinner() {
  if (checkWin(board, RED)) return RED;
  if (checkWin(board, YEL)) return YEL;
  return 0;
}

function emojiBoard() {
  const map = {
    [EMPTY]: '⚫',
    [RED]: '🔴',
    [YEL]: '🟡'
  };
  const lines = [];
  for (let r = 0; r < ROWS; r++) {
    let line = '';
    for (let c = 0; c < COLS; c++) line += map[board[r][c]];
    lines.push(line);
  }
  return lines.join('\n');
}

function shareMessage(link) {
  const winner = detectWinner();
  let header = '';
  if (winner === RED) header = `🔴 Red won in ${moveHistory.length} moves`;
  else if (winner === YEL) header = `🟡 Yellow won in ${moveHistory.length} moves`;
  else if (isFull(board)) header = '⚫ Draw game';
  else header = `${currentPlayer === RED ? '🔴' : '🟡'} Your move`;
  return `${header}\n\n${emojiBoard()}\n\n${link}`;
}

function reminderMessage(link) {
  const who = currentPlayer === RED ? '🔴 Red' : '🟡 Yellow';
  return `⏰ Reminder - ${who}, it's your move\n\n${emojiBoard()}\n\n${link}`;
}

async function copyText(text) {
  if (navigator.clipboard && window.isSecureContext) {
    await navigator.clipboard.writeText(text);
    return true;
  }
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  const ok = document.execCommand('copy');
  document.body.removeChild(ta);
  return ok;
}

async function shareViaSystemSheet(message) {
  if (!navigator.share) return { supported: false, shared: false, canceled: false };
  try {
    await navigator.share({ text: message });
    return { supported: true, shared: true, canceled: false };
  } catch (e) {
    const canceled = !!(e && (e.name === 'AbortError' || e.name === 'NotAllowedError'));
    return { supported: true, shared: false, canceled };
  }
}

async function shareCurrentPosition(opts = {}) {
  const { messageOverride = null, toastTitle = 'SHARE READY' } = opts;
  const link = buildShareLink();
  const message = messageOverride || shareMessage(link);

  const system = await shareViaSystemSheet(message);
  if (system.shared) {
    showAnnouncement(toastTitle, 'OPENED SHARE MENU', 'draw', 1200);
    return { shared: true, copied: false, canceled: false, link, message };
  }
  if (system.canceled) {
    return { shared: false, copied: false, canceled: true, link, message };
  }

  let copied = false;
  try {
    copied = await copyText(message);
  } catch (e) {
    copied = false;
  }
  const sub = copied ? 'LINK + EMOJI BOARD COPIED' : 'COPY FAILED - MESSAGE SHOWN IN PROMPT';
  showAnnouncement(toastTitle, sub, 'draw', 1400);
  if (!copied) window.prompt('Copy this message:', message);
  return { shared: false, copied, canceled: false, link, message };
}

function applyRoundEndVisuals(winner, winCoords) {
  // Safety: these overlays should never stack on top of a replay banner.
  document.getElementById('ready-overlay').classList.add('hidden');
  document.getElementById('cpu-side-select').classList.add('hidden');
  document.getElementById('match-end').classList.add('hidden');
  hideAsyncTurnOverlay();

  if (winner !== 0 && winCoords) {
    const winSet = new Set(winCoords.map(([r,c]) => r + ',' + c));
    document.querySelectorAll('.cell').forEach(cell => {
      const r = cell.dataset.r, c = cell.dataset.c;
      const piece = cell.querySelector('.piece');
      if (!piece) return;
      if (winSet.has(r + ',' + c)) piece.classList.add('win');
      else piece.classList.add('lose');
    });
    drawWinLine(winCoords);
    showAnnouncement((winner === RED ? 'RED' : 'YELLOW') + ' WINS', 'SHARE THE FINISH', winner === RED ? 'red' : 'yel', 2600);
  } else if (winner === 0 && isFull(board)) {
    showAnnouncement("IT'S A DRAW", 'SHARE THE FINISH', 'draw', 2600);
  }
}

function loadSharedPositionIfPresent() {
  const rawHash = window.location.hash.replace(/^#/, '');
  if (!rawHash) return false;
  const params = new URLSearchParams(rawHash);
  const hasAsync = params.get('a') === '1' || params.has('m');
  if (!hasAsync) return false;
  const seatParam = params.get('p');
  const moves = decodeMoves(params.get('m') || '');
  if (!moves) return false;

  // Validate sequence first so bad links do not alter the UI state.
  const testBoard = Array.from({ length: ROWS }, () => Array(COLS).fill(EMPTY));
  let testPlayer = RED;
  let testOver = false;
  for (const col of moves) {
    if (testOver) return false;
    const r = lowestEmptyRow(testBoard, col);
    if (r < 0) return false;
    testBoard[r][col] = testPlayer;
    if (checkWin(testBoard, testPlayer) || isFull(testBoard)) {
      testOver = true;
    } else {
      testPlayer = (testPlayer === RED) ? YEL : RED;
    }
  }

  asyncMode = true;
  onePlayer = false;
  selectedMode = 'link';
  setControlVisibility();
  document.getElementById('label-left').textContent = 'PLAYER 1';
  document.getElementById('label-right').textContent = 'PLAYER 2';
  document.getElementById('mode-select').classList.add('hidden');
  document.getElementById('ready-overlay').classList.add('hidden');
  document.getElementById('cpu-side-select').classList.add('hidden');
  document.getElementById('match-end').classList.add('hidden');

  scores[RED] = 0; scores[YEL] = 0;
  updateScore();
  startingPlayer = RED;
  currentPlayer = RED;
  gameOver = false;
  busy = false;
  moveHistory = [];
  resetBoardArray();
  clearBoardDOM();

  let winner = 0;
  let winCoords = null;
  for (const col of moves) {
    if (gameOver) return false;
    const placed = dropPiece(col, currentPlayer, false);
    if (!placed) return false;
    moveHistory.push(col);
    winCoords = checkWin(board, currentPlayer);
    if (winCoords) {
      winner = currentPlayer;
      gameOver = true;
      break;
    }
    if (isFull(board)) {
      gameOver = true;
      break;
    }
    currentPlayer = (currentPlayer === RED) ? YEL : RED;
  }

  if (winner || (gameOver && isFull(board))) applyRoundEndVisuals(winner, winCoords);
  else setActivePanel();
  asyncSeat = (seatParam === 'r' || seatParam === 'y') ? seatParam : seatForPlayer(currentPlayer);
  if (!gameOver) {
    if (canLocalMoveInAsync()) showAsyncYourTurnPrompt(true);
    else showAsyncWaitingPrompt();
  }
  updateShareHash();
  return true;
}

document.getElementById('share-btn').addEventListener('click', async () => {
  await shareCurrentPosition();
  if (asyncMode && !canLocalMoveInAsync()) showAsyncWaitingPrompt();
});
document.getElementById('share-btn').addEventListener('touchstart', async (e) => {
  e.preventDefault();
  await shareCurrentPosition();
  if (asyncMode && !canLocalMoveInAsync()) showAsyncWaitingPrompt();
}, { passive: false });

document.getElementById('async-share-btn').addEventListener('click', async () => {
  sfxClick();
  await shareCurrentPosition();
  showAsyncWaitingPrompt();
});
document.getElementById('async-remind-btn').addEventListener('click', async () => {
  sfxClick();
  const link = buildShareLink();
  await shareCurrentPosition({
    messageOverride: reminderMessage(link),
    toastTitle: 'REMINDER READY'
  });
  showAsyncWaitingPrompt();
});
document.getElementById('async-close-btn').addEventListener('click', () => {
  sfxClick();
  hideAsyncTurnOverlay();
});
document.getElementById('async-turn-overlay').addEventListener('click', (e) => {
  if (e.target.id !== 'async-turn-overlay') return;
  const shareBtn = document.getElementById('async-share-btn');
  const closeBtn = document.getElementById('async-close-btn');
  const mustShareState = !shareBtn.classList.contains('hidden') && closeBtn.classList.contains('hidden');
  if (mustShareState) return;
  hideAsyncTurnOverlay();
});
document.getElementById('announce').addEventListener('click', hideAnnouncement);

// ============================================================
// Init
// ============================================================
resetBoardArray();
buildBoard();
selectedMode = loadPreferredMode();
if (!ENABLE_LINK_MODE && selectedMode === 'link') selectedMode = 'cpu';
updateModeMenuHighlight(selectedMode);
if (!loadSharedPositionIfPresent()) {
  setControlVisibility();
  document.getElementById('panel-left').classList.add('dim');
  document.getElementById('panel-right').classList.add('dim');
}
setTimeout(sizeBoard, 50);
</script>
